version: "3.8"

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: eco_guard
      POSTGRES_PASSWORD: strong_password
      POSTGRES_DB: eco_guard
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: ./apps/api
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      - db
      - redis
    command: npm run start:dev   # hot‑reload

  web:
    build: ./apps/web
    env_file: .env
    ports:
      - "5173:5173"
    command: npm run dev

volumes:
  db-data:
